<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lobobo Mail</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #121212; color: white; }
        .box { border: 2px solid #333; padding: 20px; display: inline-block; border-radius: 10px; background: #1e1e1e; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; margin: 10px; }
        #email { font-size: 20px; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Lobobo Temp Mail</h1>
        <div id="email">Kliknij generuj...</div>
        <button onclick="generate()">Generuj Maila</button>
        <button onclick="check()">Sprawdź Poczta</button>
        <div id="status"></div>
        <div id="messages" style="margin-top: 20px; text-align: left;"></div>
    </div>

    <script>
        // SPRAWDŹ CZY TEN ADRES JEST IDENTYCZNY JAK NA TWOIM ZDJĘCIU CLOUDFLARE
        const API_BASE = "https://mail.lobobo-360.workers.dev";
        let myEmail = "";

        async function generate() {
            try {
                const r = await fetch(`${API_BASE}/api/gen`);
                const d = await r.json();
                myEmail = d.email;
                document.getElementById('email').innerText = myEmail;
            } catch (e) {
                console.error("Błąd generowania:", e);
                alert("API nie odpowiada (CORS lub błąd adresu)");
            }
        }

        async function check() {
            if(!myEmail) return alert("Najpierw wygeneruj maila!");
            try {
                const r = await fetch(`${API_BASE}/api/get?email=${myEmail}`);
                const d = await r.json();
                const msgDiv = document.getElementById('messages');
                msgDiv.innerHTML = d.length ? "" : "Brak wiadomości...";
                d.forEach(m => {
                    msgDiv.innerHTML += `<div style="border-bottom:1px solid #444; padding:10px;">
                        <b>Od:</b> ${m.from}<br><b>Temat:</b> ${m.subject}</div>`;
                });
            } catch (e) {
                console.error("Błąd pobierania:", e);
            }
        }
    </script>
</body>
</html>
