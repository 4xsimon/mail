<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobobo Temp Mail - Twoje API</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        .email-box { background: #f8f9fa; border: 2px dashed #007bff; padding: 15px; font-size: 1.25rem; font-weight: bold; color: #007bff; margin: 20px 0; border-radius: 8px; }
        button { background: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 1rem; transition: 0.3s; margin: 5px; }
        button:hover { background: #0056b3; }
        .msg { text-align: left; background: #fff; border: 1px solid #ddd; padding: 15px; margin-top: 10px; border-radius: 8px; }
        .msg b { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tymczasowa Poczta</h1>
        <p>Twoje autorskie API działa pod spodem!</p>
        <div class="email-box" id="emailAddr">Kliknij generuj...</div>
        
        <button onclick="generateMail()">Generuj Adres</button>
        <button onclick="checkMail()">Odśwież Poczta</button>

        <div id="status"></div>
        <div id="messages"></div>
    </div>

    <script>
        // ADRES TWOJEGO WORKERA
        const API_BASE = "https://mail.lobobo-360.workers.dev";
        let currentEmail = "";

        async function generateMail() {
            document.getElementById('status').innerText = "Generowanie...";
            try {
                const res = await fetch(`${API_BASE}/api/gen`);
                const data = await res.json();
                currentEmail = data.email;
                document.getElementById('emailAddr').innerText = currentEmail;
                document.getElementById('status').innerText = "Gotowe!";
                document.getElementById('messages').innerHTML = "";
            } catch (e) {
                document.getElementById('status').innerText = "Błąd API!";
            }
        }

        async function checkMail() {
            if (!currentEmail) return alert("Najpierw wygeneruj maila!");
            document.getElementById('status').innerText = "Sprawdzanie...";
            try {
                const res = await fetch(`${API_BASE}/api/get?email=${currentEmail}`);
                const data = await res.json();
                
                const container = document.getElementById('messages');
                container.innerHTML = "";
                
                if (data.length === 0) {
                    container.innerHTML = "<p>Brak nowych wiadomości.</p>";
                } else {
                    data.forEach(m => {
                        container.innerHTML += `
                            <div class="msg">
                                <b>Od:</b> ${m.od} <br>
                                <b>Temat:</b> ${m.temat} <br>
                                <small>${m.data}</small>
                            </div>`;
                    });
                }
                document.getElementById('status').innerText = "Zaktualizowano.";
            } catch (e) {
                document.getElementById('status').innerText = "Błąd pobierania!";
            }
        }
    </script>
</body>
</html>
